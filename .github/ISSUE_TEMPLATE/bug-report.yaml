---
name: Bug Report
description: Report a problem to help improve the project
labels:
  - bug
  - needs-triage
assignees:
  - jabrown93
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the form below to
        help diagnose and fix the issue.
  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-checks
      options:
        - label: I am running the latest released version.
          required: true
        - label: I have searched existing issues and this has not already been reported.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs or error output. Redact any sensitive information.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: The version of the project you are running.
      placeholder: e.g. 1.2.3
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, runtime/language version, and any other relevant details.
      placeholder: |
        - OS: e.g. Ubuntu 24.04 / macOS 15 / Windows 11
        - Runtime: e.g. Node 20.11.0 / Python 3.12
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or links that might help.
    validations:
      required: false
