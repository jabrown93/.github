---
# Versioning for this repo itself, from Conventional Commits.
#
# Releases-only: semantic-release pushes the vX.Y.Z tag and publishes a GitHub
# Release. Nothing is pushed back to main, so no CHANGELOG commit, no [skip ci]
# guard, and no GitHub App token — the `main` rulesets (required signatures,
# required pull request) gate pushes to the branch, and there is no tag ruleset,
# so the built-in GITHUB_TOKEN with contents:write covers tag + Release.
#
# Consumers pin this repo by commit digest with a `# vX.Y.Z` comment; the tag
# these releases create is what makes that comment readable and lets Renovate
# propose the bump. See the Versioning section of README.md.
name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha
      - next

permissions:
  contents: read

# Serialize releases so two quick merges can't race semantic-release / tags.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the tag, create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags so semantic-release can find the last release
          # Check out the current branch tip, not github.sha. With concurrency
          # queueing, a queued run otherwise releases its trigger SHA and is
          # rejected as non-fast-forward once the branch has advanced. Pulling
          # the tip turns redundant queued runs into no-ops instead.
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install release tooling
        run: npm clean-install

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
