---
# Reusable workflow: lint + build a Node.js project across a version matrix.
# Mirrors the per-repo "Build and Lint" workflow the Homebridge plugins each
# carried. Trigger events (push / pull_request) are defined by the caller.
name: Build and Lint
on:
  workflow_call:
    inputs:
      node-versions:
        description: JSON array of Node.js versions for the build matrix
        required: false
        type: string
        default: '["20.x", "22.x", "24.x"]'
      runs-on:
        description: Runner label
        required: false
        type: string
        default: ubuntu-latest
jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Lint the project
        run: npm run lint

      # Consumers run `prettier --check .` from prepublishOnly, which gates the
      # npm publish rather than the PR: a formatting nit fails the release after
      # semantic-release has already committed, tagged and pushed. Check it here
      # so it blocks the PR instead, and publishing only builds the artifact.
      - name: Check formatting
        run: npm run prettier

      - name: Build the project
        run: npm run build

      - name: Test the project
        run: npm run test
